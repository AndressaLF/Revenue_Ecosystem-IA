vertical: physical
locale: en-US
geo: US

price:
  min: 35
  max: 100
  impulse_max: 75

amazon:
  cookie_days: 24
  commission_pct_default: 3.0
  conversion_rate_est: 0.08
  refund_rate_max: 0.08

validation:
  opportunity_score_min: 65
  matrix_score_min: 80
  estimated_epc_min: 0.40
  search_volume_min: 1000
  competition_score_max: 50
  rating_min: 4.2
  reviews_min: 100

niches_mvp:
  - home office setup
  - cable management
  - desk organization
  - kitchen gadgets

subreddits:
  - BuyItForLife
  - homeoffice
  - OrganizationPorn
  - DeskSetup

intent_patterns:
  - "best .+ for"
  - ".+ worth it"
  - "alternative to"
  - "under desk"
  - "cable management"
  - "ergonomic"

pain_patterns:
  - category: physical_pain
    regex: "back pain|neck pain|wrist pain|posture"
  - category: organization
    regex: "cable mess|clutter|messy desk|organize"
  - category: time_waste
    regex: "wasting time|every day I|constantly fixing"
